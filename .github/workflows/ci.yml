name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v2
      
      - name: Install dependencies
        run: |
          uv pip install ruff black mypy
      
      - name: Run black
        run: black --check src/ tests/
      
      - name: Run ruff
        run: ruff check src/ tests/
      
      - name: Run mypy
        run: mypy src/dedupl

  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
        exclude:
          # Exclude some combinations to save CI time
          - os: windows-latest
            python-version: '3.8'
          - os: windows-latest
            python-version: '3.9'
          - os: macos-latest
            python-version: '3.8'
          - os: macos-latest
            python-version: '3.9'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          # Install fpcalc
          wget https://github.com/acoustid/chromaprint/releases/download/v1.5.1/chromaprint-fpcalc-1.5.1-linux-x86_64.tar.gz
          tar -xzf chromaprint-fpcalc-1.5.1-linux-x86_64.tar.gz
          sudo cp chromaprint-fpcalc-1.5.1-linux-x86_64/fpcalc /usr/local/bin/
          sudo chmod +x /usr/local/bin/fpcalc
      
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg chromaprint
      
      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ffmpeg
          # Download and extract fpcalc for Windows
          Invoke-WebRequest -Uri "https://github.com/acoustid/chromaprint/releases/download/v1.5.1/chromaprint-fpcalc-1.5.1-windows-x86_64.zip" -OutFile "chromaprint.zip"
          Expand-Archive -Path "chromaprint.zip" -DestinationPath "."
          $env:PATH += ";$PWD\chromaprint-fpcalc-1.5.1-windows-x86_64"
      
      - name: Install uv
        uses: astral-sh/setup-uv@v2
      
      - name: Install Python dependencies
        run: |
          uv pip install pytest pytest-cov pytest-mock
          uv pip install Pillow imagehash opencv-python-headless numpy tqdm
      
      - name: Run tests
        run: |
          python -m pytest tests/unit/ -v --cov=src/dedupl --cov-report=xml
      
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          wget https://github.com/acoustid/chromaprint/releases/download/v1.5.1/chromaprint-fpcalc-1.5.1-linux-x86_64.tar.gz
          tar -xzf chromaprint-fpcalc-1.5.1-linux-x86_64.tar.gz
          sudo cp chromaprint-fpcalc-1.5.1-linux-x86_64/fpcalc /usr/local/bin/
          sudo chmod +x /usr/local/bin/fpcalc
      
      - name: Install uv
        uses: astral-sh/setup-uv@v2
      
      - name: Install dependencies
        run: |
          uv pip install -e ".[all,dev]"
      
      - name: Check external dependencies
        run: |
          which ffprobe
          which fpcalc
          python -c "import cv2; print(f'OpenCV version: {cv2.__version__}')"
      
      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ -v -m integration
        continue-on-error: true  # Integration tests might not exist yet

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install build tools
        run: |
          pip install build twine
      
      - name: Build distribution
        run: python -m build
      
      - name: Check distribution
        run: twine check dist/*
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist/