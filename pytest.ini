[pytest]
# Pytest configuration file

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = tests

# Minimum Python version
minversion = 6.0

# Output options
addopts = 
    -ra
    --strict-markers
    --ignore=old
    --cov=src/dedupl
    --cov-report=term-missing:skip-covered
    --cov-report=html
    --cov-report=xml
    --cov-branch
    -v

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    requires_ffmpeg: Tests requiring ffmpeg/ffprobe
    requires_fpcalc: Tests requiring Chromaprint fpcalc
    requires_opencv: Tests requiring OpenCV

# Coverage settings
[coverage:run]
source = src/dedupl
omit = 
    */tests/*
    */test_*.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if __name__ == .__main__.:
    raise AssertionError
    raise NotImplementedError
    if TYPE_CHECKING: