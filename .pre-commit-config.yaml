repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-case-conflict
      - id: debug-statements
      - id: requirements-txt-fixer

  # Python formatting and linting
  - repo: local
    hooks:
      - id: black
        name: black
        entry: black
        language: system
        types: [python]
        args: [--check, --diff]

      - id: ruff
        name: ruff
        entry: ruff
        language: system
        types: [python]
        args: [check, --fix]

      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        args: [src/dedupl]
        pass_filenames: false

      - id: pytest-unit
        name: pytest (unit tests)
        entry: pytest
        language: system
        types: [python]
        args: [tests/unit/, -v, --tb=short]
        pass_filenames: false

      - id: bandit
        name: bandit
        entry: bandit
        language: system
        types: [python]
        args: ['-r', 'src/', '-f', 'json']

  # Additional Python checks
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.10.1
    hooks:
      - id: pyupgrade
        args: [--py38-plus]

  # Project validation
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.15
    hooks:
      - id: validate-pyproject
